<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@600;700&family=Montserrat:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="brand">🍽 Restaurant</span>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="register.html" class="active">Register</a>
            <a href="reservation.html">Reserve</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-wrapper centered">
        <div class="card auth-card" style="max-width:480px;">
            <h2>Create Account</h2>
            <p class="subtitle">Join Restaurant and start reserving today</p>

            <div class="section-label">👤 Personal Info</div>

            <div class="two-col">
                <div class="form-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Ahmed" autocomplete="given-name" />
                    <span class="error-msg" id="fname-error"></span>
                </div>
                <div class="form-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Hassan" autocomplete="family-name" />
                    <span class="error-msg" id="lname-error"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                <span class="error-msg" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="+20 1XX XXX XXXX" autocomplete="tel" />
                <span class="error-msg" id="phone-error"></span>
            </div>

            <div class="section-label">🔒 Account Security</div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Create a strong password"
                        autocomplete="new-password" />
                    <button class="toggle-btn" id="togglePass" type="button"
                        aria-label="Toggle password visibility">👁</button>
                </div>
                <div class="strength-wrap">
                    <div id="strength-bar"></div>
                </div>
                <span id="strength-text"></span>
                <span class="error-msg" id="password-error"></span>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirm" placeholder="Repeat your password"
                        autocomplete="new-password" />
                    <button class="toggle-btn" id="toggleConfirm" type="button"
                        aria-label="Toggle confirm password visibility">👁</button>
                </div>
                <span class="error-msg" id="confirm-error"></span>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" />
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                        Policy</a></label>
            </div>
            <span class="error-msg" id="terms-error"></span>

            <button class="btn-primary full-width" id="registerBtn">Create Account</button>

            <div class="nav-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 Restaurant. All rights reserved. | <a href="#">Privacy Policy</a></p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="register.js"></script>
</body>

</html>
