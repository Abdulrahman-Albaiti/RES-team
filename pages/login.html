<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@600;700&family=Montserrat:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="brand">🍽 Restaurant</span>
        <div class="nav-links">
            <a href="login.html" class="active">Login</a>
            <a href="register.html">Register</a>
            <a href="reservation.html">Reserve</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-wrapper centered">
        <div class="card auth-card">
            <h2>Welcome Back!</h2>
            <p class="subtitle">Login to your Restaurant account</p>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
                <span class="error-msg" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password" />
                    <button class="toggle-btn" id="togglePass" type="button"
                        aria-label="Toggle password visibility">👁</button>
                </div>
                <span class="error-msg" id="password-error"></span>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" id="remember" /> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button class="btn-primary full-width" id="loginBtn">Login</button>

            <div class="divider">or</div>

            <div class="nav-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 Restaurant. All rights reserved. | <a href="#">Privacy Policy</a></p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="login.js"></script>
</body>

</html>
