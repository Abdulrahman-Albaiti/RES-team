<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Tasty Bites</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Open+Sans&family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <nav class="navbar">
        <a href="menu.html">Menu</a>
        <a href="payment.html">Checkout</a>
    </nav>

    <main class="content-wrapper">
        <div class="card payment-form">
            <h2>Complete Your Payment</h2>
            <p>Order Total: <strong style="color: #8B0000;">$<span id="final-total">0.00</span></strong></p>
            <hr style="margin: 20px 0; border: 0.5px solid #eee;">
            
            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" id="cardName" placeholder="Full Name">
            </div>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" id="cardNumber" placeholder="16-digit number" maxlength="16">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" id="cvv" placeholder="***" maxlength="3">
                </div>
            </div>
            <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="processPayment()">Pay Now</button>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Tasty Bites | <a href="menu.html">Return to Menu</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
